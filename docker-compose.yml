services:
  # 1. BASE DE DADES (MySQL)
  mysql:
    image: mysql:8.0
    container_name: nexe_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nexe_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: nexe_user
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - nexe_db_data:/var/lib/mysql
    networks:
      - nexe_network

  # 2. BACKEND (Laravel / PHP)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexe_backend
    restart: unless-stopped
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=nexe_db
      - DB_PORT=3306
      - DB_DATABASE=nexe_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
    networks:
      - nexe_network
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  # 3. FRONTEND (Angular 20 / Node)
  frontend:
    image: node:20
    container_name: nexe_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    # Usem 'npm run start' perquè agafi el --poll que hem posat al package.json
    command: sh -c "npm install --legacy-peer-deps && npx ng serve --host 0.0.0.0 --disable-host-check"
    networks:
      - nexe_network

# Xarxa interna
networks:
  nexe_network:
    driver: bridge

# Volums persistents (NOMÉS els noms del volum)
volumes:
  nexe_db_data: