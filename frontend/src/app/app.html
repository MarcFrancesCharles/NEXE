<header class="main-nav">
  <div class="nav-container">
    <div class="nav-brand" routerLink="/">
      <div class="logo-icon">N</div>
      <span class="logo-text">NEXE</span>
    </div>

    <nav class="nav-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Explorar</a>
      
      @if (!estaLogat()) {
        <a routerLink="/login" routerLinkActive="active" class="link-auth">Entrar</a>
        <a routerLink="/register" class="btn-cta">Registra't</a>
      } @else {
        <a routerLink="/perfil" routerLinkActive="active">El meu Perfil</a>
        <button (click)="sortir()" class="btn-logout">Sortir</button>
      }
    </nav>
  </div>
</header>

<main class="main-layout">
  <router-outlet />
</main>

<footer class="app-footer">
  <div class="footer-content">
    <p>&copy; 2026 NEXE - Connectant el comerç de proximitat</p>
    <div class="footer-links">
      <a>Ajuda</a>
      <a>Privacitat</a>
      <a>Contacte</a>
    </div>
  </div>
</footer>
